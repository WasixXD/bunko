<p-dialog
  [(visible)]="visible"
  [modal]="true"
  [closable]="true"
  [draggable]="false"
  [resizable]="false"
  header="Add Manga"
  styleClass="add-manga-dialog"
  [style]="{ width: '980px', maxWidth: '96vw' }"
  [breakpoints]="{ '768px': '100vw' }"
  [contentStyle]="{ 'max-height': '85vh', 'overflow-y': 'auto' }"
  (onHide)="reset()"
>
  <div class="amd">
    <div class="amd__left">
      <div class="amd__field">
        <label class="amd__label">Manga</label>
        <app-manga-search-select
          (mangaSelected)="onMangaSelected($event)"
          (mangaCleared)="onMangaCleared()"
        />
      </div>

      <div class="amd__field">
        <label class="amd__label">Schedule (cron)</label>
        <app-cron-input [(value)]="cron" />
      </div>

      <div class="amd__field">
        <label class="amd__label">Destination path</label>
        <div class="amd__path-wrap">
          <i class="pi pi-folder amd__path-icon"></i>
          <input
            class="amd__path-input"
            type="text"
            placeholder="./mangas/"
          />
        </div>
      </div>

      @if (error()) {
        <p class="amd__error">
          <i class="pi pi-exclamation-triangle"></i>
          {{ error() }}
        </p>
      }
    </div>

    <div class="amd__right">
      <div class="amd__cover-area">
        @if (coverUrl()) {
          <img class="amd__cover" [src]="coverUrl()!" [alt]="selectedManga?.name" />
        } @else if (coverLoading()) {
          <div class="amd__cover-placeholder">
            <i class="pi pi-spin pi-spinner"></i>
            <span>Loading cover...</span>
          </div>
        } @else {
          <div class="amd__cover-placeholder">
            <i class="pi pi-image"></i>
            <span>No manga selected</span>
          </div>
        }
      </div>

      <div class="amd__actions">
        <button
          class="amd__btn amd__btn--cancel"
          type="button"
          [disabled]="submitting()"
          (click)="close()"
        >
          Cancel
        </button>
        <button
          class="amd__btn amd__btn--confirm"
          type="button"
          [disabled]="!selectedManga || submitting()"
          (click)="onConfirm()"
        >
          @if (submitting()) {
            <i class="pi pi-spin pi-spinner"></i>
            Adding...
          } @else {
            <i class="pi pi-check"></i>
            Confirm
          }
        </button>
      </div>
    </div>
  </div>
</p-dialog>
