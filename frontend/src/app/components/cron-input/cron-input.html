<div class="cron">
  <div class="cron__input-wrap">
    <i class="pi pi-clock cron__icon"></i>
    <input
      class="cron__input"
      type="text"
      placeholder="ex: 0 8 * * 1"
      [value]="value()"
      (input)="onInput($any($event.target).value)"
      spellcheck="false"
    />
  </div>

  <p class="cron__human" [class.cron__human--invalid]="!isValid">
    <i class="pi pi-info-circle"></i>
    {{ humanReadable }}
  </p>
</div>
