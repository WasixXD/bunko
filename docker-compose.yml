services:
  bunko:
    container_name: bunko
    image: lucaswasilewski/bunko:${BUNKO_VERSION:-latest}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      TZ: ${TZ:-UTC}
      BUNKO_DATABASE: /data/bunko.db
      BUNKO_LISTEN_ADDR: :3000
      BUNKO_STATIC_DIR: /app/public/browser
    volumes:
      - ./data:/data
      - ./library:/library
